# Static Astro site to GitHub Pages.
# Settings → Pages: Source = GitHub Actions.
# Set repository variable SITE_URL to https://<user>.github.io/<repo>/ (trailing slash ok).
# ASTRO_BASE_PATH is derived from the repo name so it stays in sync with GitHub Pages.

name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Use Node 24 for GitHub’s JavaScript actions (checkout, setup-node, deploy-pages, etc.):
# https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - name: Install and build
        run: npm ci && npm run build
        env:
          SITE_URL: ${{ vars.SITE_URL }}
          ASTRO_BASE_PATH: /${{ github.event.repository.name }}/
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
